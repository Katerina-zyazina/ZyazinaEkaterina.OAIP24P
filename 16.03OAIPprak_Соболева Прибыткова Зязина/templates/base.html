<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>каталог материалов</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        nav { background: #ff8f1f; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #000000; font-weight: bold; }
        av a:hover { text-decoration: underline; }
        .error { color: red; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000000; padding: 8px; text-align: left; }
        th { background-color: #ffa323; }
        form { max-width: 400px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box;}
        button { padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="/">главная</a>
        <a href="/materials">все материальчики</a>
    </nav>
    <nav>
        {% if session.get('logged_in') %}
        <a href="/add">Добавить материал</a>
        <a href="/logout" style="color: red;">Выйти ({{ session.user }})</a>
        {% else %}
        <a href="/login">Войти</a>
        {% endif %}
    </nav>
    
    <hr>

    {% block content %}{% endblock %}

</body>
</html>
