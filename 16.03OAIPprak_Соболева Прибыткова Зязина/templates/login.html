{% extends 'base.html' %}

{% block content %}
<h1>Вход в систему</h1>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<p><i>Подсказка: логин <b>admin</b>, пароль <b>11111</b></i></p>

<form method="POST">
    <label>Логин:</label>
    <input type="text" name="username" required>

    <label>Пароль:</label>
    <input type="password" name="password" required>

    <button type="submit">Войти</button>
</form>
{% endblock %}
